<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="48" height="48" rx="13" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="48" height="48" rx="13" fill="url(#shine)"/>
  <!-- Coffee cup body -->
  <rect x="13" y="18" width="18" height="16" rx="2.5" fill="white" opacity="0.95"/>
  <!-- Cup handle -->
  <path d="M31 22 Q38 22 38 27 Q38 32 31 32" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.95"/>
  <!-- Steam lines -->
  <path d="M17 15 Q18.5 12.5 17 10" stroke="white" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M22 14 Q23.5 11 22 8.5" stroke="white" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M27 15 Q28.5 12.5 27 10" stroke="white" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.7"/>
  <!-- Saucer -->
  <rect x="10" y="34" width="24" height="2.5" rx="1.25" fill="white" opacity="0.85"/>
  <!-- Small "Q" detail on cup -->
  <text x="18" y="30" font-family="Arial Black, sans-serif" font-size="9" font-weight="900" fill="#f97316" letter-spacing="-0.5">JQ</text>
</svg>
